name: Build REDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Set version tag
        run: |
          VER=$(node -p "require('./package.json').version")
          TAG="v${VER}-build.${{ github.run_number }}"
          echo "APP_VERSION=${VER}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
          echo "Tag: ${TAG}"

      - name: Install JS deps
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_TELEMETRY: "1"
          EXPO_NO_DOTENV: "1"

      - name: Fix Gradle properties
        run: |
          chmod +x android/gradlew
          sed -i '/android\.kotlinVersion/d' android/gradle.properties
          sed -i '/kotlin\.version/d' android/gradle.properties
          sed -i '/kotlinVersion/d' android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          cat android/gradle.properties

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x lint --stacktrace

      - name: Locate APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "APK not found!" && exit 1; fi
          echo "UNSIGNED_APK=${APK}" >> $GITHUB_ENV
          echo "APK: $APK ($(du -h $APK | cut -f1))"

      - name: Generate Keystore RSA-4096
        run: |
          keytool -genkey -v \
            -keystore redroid.jks \
            -alias redroid \
            -keyalg RSA -keysize 4096 -validity 10000 \
            -storepass REDroid2025 -keypass REDroid2025 -noprompt \
            -dname "CN=REDroid, OU=RE, O=REDroid, L=Cairo, ST=Cairo, C=EG"
          echo "Keystore generated"

      - name: Zipalign
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          $BT/zipalign -v -p 4 "$UNSIGNED_APK" redroid-aligned.apk
          echo "ALIGNED_APK=redroid-aligned.apk" >> $GITHUB_ENV

      - name: Sign APK RSA-4096 V2+V3
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          OUT="REDroid-${{ env.RELEASE_TAG }}-signed.apk"
          $BT/apksigner sign \
            --ks redroid.jks --ks-key-alias redroid \
            --ks-pass pass:REDroid2025 --key-pass pass:REDroid2025 \
            --out "$OUT" "${{ env.ALIGNED_APK }}"
          echo "SIGNED_APK=${OUT}" >> $GITHUB_ENV
          echo "Signed: $OUT ($(du -h $OUT | cut -f1))"

      - name: Verify signature
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          $BT/apksigner verify --verbose "${{ env.SIGNED_APK }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: REDroid-${{ env.RELEASE_TAG }}
          path: ${{ env.SIGNED_APK }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "REDroid ${{ env.RELEASE_TAG }}"
          body: |
            ## REDroid ${{ env.APP_VERSION }} - Professional RE Toolkit

            29 reverse engineering tool | 10 techniques | RSA-4096 signed

            Build #${{ github.run_number }}
          files: ${{ env.SIGNED_APK }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
