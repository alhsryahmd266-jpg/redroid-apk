name: Build REDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
        working-directory: .

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Generate native Android project
        run: |
          npx expo prebuild --platform android --clean --no-install
        working-directory: .

      - name: Make Gradle executable
        run: chmod +x android/gradlew
        working-directory: .

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        working-directory: .

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore redroid-release.keystore \
            -alias redroid-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass redroid2024 \
            -keypass redroid2024 \
            -dname "CN=REDroid, OU=Security, O=REDroid, L=Cairo, ST=Cairo, C=EG"

      - name: Sign APK with apksigner
        run: |
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $UNSIGNED_APK"
          BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS_VERSION"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
            --ks redroid-release.keystore \
            --ks-key-alias redroid-key \
            --ks-pass pass:redroid2024 \
            --key-pass pass:redroid2024 \
            --out redroid-v1.0.2-signed.apk \
            "$UNSIGNED_APK"
          echo "APK signed successfully!"
          ls -lh redroid-v1.0.2-signed.apk

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner verify \
            --verbose redroid-v1.0.2-signed.apk 2>&1 | head -20

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: redroid-apk-signed
          path: redroid-v1.0.2-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2
          name: "REDroid v1.0.2 — APK Reverse Engineering Tools"
          body: |
            ## REDroid v1.0.2 🔴

            Professional Android cybersecurity reference app for APK reverse engineering.

            ### Features
            - 28 professional tools (Jadx, Frida, Ghidra, Burp Suite, MobSF, and more)
            - 10 reverse engineering techniques with step-by-step guides
            - Commands reference with copy support
            - Dark theme optimized for security professionals

            ### Installation
            1. Download `redroid-v1.0.2-signed.apk`
            2. Enable "Install from unknown sources" on your Android device
            3. Install the APK

            **Compatible with Android 5.0+ (API 21+)**
          files: redroid-v1.0.2-signed.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
