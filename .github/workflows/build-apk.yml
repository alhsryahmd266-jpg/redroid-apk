name: Build REDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Label للإصدار (مثال: beta, rc1)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Node + Java + Android SDK ──────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 3. Dynamic versioning ─────────────────────────────────
      - name: Compute release tag
        run: |
          VER=$(node -p "require('./package.json').version")
          LABEL="${{ github.event.inputs.version_label }}"
          if [ -n "$LABEL" ]; then
            TAG="v${VER}-${LABEL}"
          else
            TAG="v${VER}-build.${{ github.run_number }}"
          fi
          echo "APP_VERSION=${VER}"       >> $GITHUB_ENV
          echo "RELEASE_TAG=${TAG}"       >> $GITHUB_ENV
          echo "SIGNED_APK=redroid-${TAG}-signed.apk" >> $GITHUB_ENV
          echo "Release tag: ${TAG}"

      # ─── 4. Install deps ───────────────────────────────────────
      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      # ─── 5. Expo prebuild ──────────────────────────────────────
      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          EXPO_NO_DOTENV: 1

      # ─── 6. Gradle build ───────────────────────────────────────
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false

      - name: Locate unsigned APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "UNSIGNED_APK=${APK}" >> $GITHUB_ENV
          echo "Unsigned APK: ${APK} ($(du -h "${APK}" | cut -f1))"

      # ─── 7. Sign APK ───────────────────────────────────────────
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore redroid-release.keystore \
            -alias redroid-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass redroid2024 \
            -keypass redroid2024 \
            -dname "CN=REDroid, OU=Security, O=REDroid, L=Cairo, ST=Cairo, C=EG"

      - name: Sign APK with apksigner
        run: |
          BTV=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Build tools: ${BTV}"
          $ANDROID_SDK_ROOT/build-tools/${BTV}/apksigner sign \
            --ks redroid-release.keystore \
            --ks-key-alias redroid-key \
            --ks-pass pass:redroid2024 \
            --key-pass pass:redroid2024 \
            --out "${{ env.SIGNED_APK }}" \
            "${{ env.UNSIGNED_APK }}"
          echo "Signed: ${{ env.SIGNED_APK }} ($(du -h "${{ env.SIGNED_APK }}" | cut -f1))"

      - name: Verify APK signature
        run: |
          BTV=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/${BTV}/apksigner verify \
            --verbose "${{ env.SIGNED_APK }}" 2>&1 | head -15

      # ─── 8. Upload & Release ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: redroid-${{ env.RELEASE_TAG }}
          path: ${{ env.SIGNED_APK }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "REDroid ${{ env.RELEASE_TAG }}"
          body: |
            ## 🔴 REDroid ${{ env.APP_VERSION }}

            مرجع احترافي لأدوات الهندسة العكسية على أندرويد.

            ### المحتوى
            - 29 أداة هندسة عكسية احترافية
            - 10 تقنيات خطوة بخطوة
            - مرجع أوامر سريع مع نسخ بلمسة
            - تصميم سايبرسيكيوريتي داكن

            ### التثبيت
            1. حمّل الـ APK من الأسفل
            2. فعّل "تثبيت من مصادر غير معروفة"
            3. ثبّت وشغّل

            **أندرويد 5.0+ (API 21+) | Build #${{ github.run_number }}**
          files: ${{ env.SIGNED_APK }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
