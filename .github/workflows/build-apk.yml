name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Run expo prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias redroid-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore /tmp/redroid.keystore \
            -storepass redroid2024 \
            -keypass redroid2024 \
            -dname "CN=REDroid, OU=SecurityTools, O=REDroid, L=Cairo, S=Cairo, C=EG" \
            -noprompt

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks /tmp/redroid.keystore \
            --ks-key-alias redroid-key \
            --ks-pass pass:redroid2024 \
            --key-pass pass:redroid2024 \
            --out android/app/build/outputs/apk/release/REDroid-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          echo "APK signed successfully ✓"
          ls -lh android/app/build/outputs/apk/release/

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $BUILD_TOOLS/apksigner verify --verbose \
            android/app/build/outputs/apk/release/REDroid-signed.apk
          echo "Signature valid ✓"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: REDroid-APK-${{ github.sha }}
          path: android/app/build/outputs/apk/release/REDroid-signed.apk
          retention-days: 90

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/REDroid-signed.apk
          name: "🔴 REDroid ${{ github.ref_name }}"
          body: |
            ## 🔴 REDroid ${{ github.ref_name }}
            ### أقوى مرجع لأدوات الهندسة العكسية على أندرويد

            ---

            ### 📥 التحميل
            انقر على **`REDroid-signed.apk`** أدناه لتحميل التطبيق مباشرة.

            ### ✨ الميزات
            - **14 أداة** هندسة عكسية عالمية (JADX, Frida, Ghidra, APKTool, ...)
            - **10 تقنيات** تفصيلية خطوة بخطوة
            - مرجع أوامر شامل مع نسخ بلمسة واحدة
            - تصميم سايبرسيكيوريتي احترافي (Dark Mode حصري)

            ### 🔐 التوقيع الرقمي
            التطبيق موقّع رقمياً بـ RSA-2048. للتثبيت:
            1. فعّل "مصادر غير معروفة" في الإعدادات
            2. افتح REDroid-signed.apk
            3. اضغط تثبيت
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
