name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias redroid-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore /tmp/redroid.keystore \
            -storepass redroid2024 \
            -keypass redroid2024 \
            -dname "CN=REDroid, OU=SecurityTools, O=REDroid, L=Cairo, S=Cairo, C=EG" \
            -noprompt
          echo "Keystore generated ✓"

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS_VER=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_VER"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VER/apksigner sign \
            --ks /tmp/redroid.keystore \
            --ks-key-alias redroid-key \
            --ks-pass pass:redroid2024 \
            --key-pass pass:redroid2024 \
            --out android/app/build/outputs/apk/release/REDroid-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          echo "APK signed ✓"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_VER=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VER/apksigner verify \
            --verbose \
            android/app/build/outputs/apk/release/REDroid-signed.apk
          ls -lh android/app/build/outputs/apk/release/
          echo "Signature verified ✓"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: REDroid-APK
          path: android/app/build/outputs/apk/release/REDroid-signed.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/REDroid-signed.apk
          name: "REDroid ${{ github.ref_name }}"
          body: |
            ## 🔴 REDroid ${{ github.ref_name }}
            ### أقوى مرجع لأدوات الهندسة العكسية على أندرويد

            ### 📥 تحميل التطبيق
            اضغط على **REDroid-signed.apk** أدناه

            ### ✨ الميزات
            - 14 أداة هندسة عكسية عالمية (JADX, Frida, Ghidra, APKTool...)
            - 10 تقنيات تفصيلية خطوة بخطوة
            - مرجع أوامر مع نسخ بلمسة واحدة
            - تصميم Cybersecurity احترافي داكن

            ### 🔐 التوقيع الرقمي
            موقّع بـ RSA-2048. فعّل "مصادر غير معروفة" ثم ثبّت.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
